services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mlm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mlm_admin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mlm_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mlm_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mlm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mlm_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mlm_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: 8080
      APP_NAME: mlm-admin-api
      APP_VERSION: 1.0.0
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:3000
      
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mlm_admin
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      DB_SSL_MODE: disable
      DB_MAX_OPEN_CONNS: 25
      DB_MAX_IDLE_CONNS: 5
      DB_CONN_MAX_LIFETIME: 1h
      
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD:
      REDIS_DB: 0
      
      JWT_SECRET: ${JWT_SECRET:-your_very_secure_jwt_secret_key_min_32_chars_here}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      JWT_ISSUER: mlm-admin-api
      
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,PATCH,OPTIONS
      CORS_ALLOWED_HEADERS: Origin,Content-Type,Accept,Authorization,X-Requested-With
      CORS_ALLOW_CREDENTIALS: true
      CORS_MAX_AGE: 86400
      
      RATE_LIMIT_ENABLED: true
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW: 1m
      RATE_LIMIT_BURST: 10
      
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      LOG_OUTPUT: stdout
      
      SWAGGER_ENABLED: true
      SWAGGER_HOST: localhost:8080
      SWAGGER_BASE_PATH: /api/v1
      
      BCRYPT_COST: 12
      SESSION_TIMEOUT: 30m
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_DURATION: 15m
      
      DEFAULT_PAGE: 1
      DEFAULT_LIMIT: 20
      MAX_LIMIT: 100
      
      MLM_MAX_LEVELS: 10
      INCOME_CALCULATION_BATCH_SIZE: 100
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - mlm_network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    container_name: mlm_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      BACKEND_HOST: backend
      BACKEND_PORT: "8080"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - mlm_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mlm_network:
    driver: bridge