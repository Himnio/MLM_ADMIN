# ============================================================
# Render Blueprint - MLM Admin Deployment
# ============================================================
# API proxying: the frontend Next.js server proxies /api/v1/*
# to http://mlm-backend:8080 via BACKEND_URL (internal DNS).
# No CORS issues, no need to guess external URLs.
#
# Optional after deploy:
#   mlm-backend → Environment → FRONTEND_URL
#   (needed for redirects/password-reset links)
# ============================================================

databases:
  - name: mlm-postgres
    plan: free
    databaseName: mlm_admin
    user: mlm_admin

services:
  - type: keyvalue
    name: mlm-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

  # -------------------- Backend API --------------------
  - type: web
    name: mlm-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: "8080"
      - key: APP_PORT
        value: "8080"
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: mlm-admin-api
      - key: APP_VERSION
        value: 1.0.0
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: DB_SSL_MODE
        value: require
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mlm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mlm-redis
          property: connectionString
      # Update this in Dashboard after deploy: FRONTEND_URL = https://mlm-frontend-XXXX.onrender.com
      - key: FRONTEND_URL
        value: http://localhost:3000
      # Allow any frontend URL (JWT protects the API)
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /api/v1/health
    autoDeploy: true

  # -------------------- Frontend --------------------
  - type: web
    name: mlm-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
      # Points to the backend's internal Render hostname — no random suffix needed
      - key: BACKEND_URL
        value: "http://mlm-backend:8080"
    healthCheckPath: /
    autoDeploy: true
