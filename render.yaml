# ============================================================
# Render Blueprint - MLM Admin Deployment
# ============================================================

databases:
  - name: mlm-postgres
    plan: free
    databaseName: mlm_admin
    user: mlm_admin

services:
  # -------------------- Redis (Render Key Value) --------------------
  - type: keyvalue
    name: mlm-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

  # -------------------- Backend API --------------------
  - type: web
    name: mlm-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 8080
      - key: APP_PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: mlm-admin-api
      - key: APP_VERSION
        value: 1.0.0
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: DB_SSL_MODE
        value: require
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mlm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mlm-redis
          property: connectionString
      # --- FIXED: real frontend hostname (Render added -ukjv suffix) ---
      - key: FRONTEND_URL
        value: https://mlm-frontend-ukjv.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mlm-frontend-ukjv.onrender.com
    healthCheckPath: /api/v1/health
    autoDeploy: true

  # -------------------- Frontend --------------------
  - type: web
    name: mlm-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
      # --- FIXED: real backend hostname (Render added -qho1 suffix) ---
      - key: NEXT_PUBLIC_API_URL
        value: https://mlm-backend-qho1.onrender.com/api/v1
    healthCheckPath: /
    autoDeploy: true