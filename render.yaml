# ============================================================
# Render Blueprint - MLM Admin Deployment
# ============================================================
# Steps:
#   1. Push this repo to GitHub
#   2. In Render dashboard: New -> Blueprint -> Connect your repo
#   3. Render auto-detects this file and provisions all services
#   4. After first deploy, update env vars in dashboard if needed
#      (see notes below)
# ============================================================

# PostgreSQL (defined separately from services)
databases:
  - name: mlm-postgres
    plan: free
    databaseName: mlm_admin
    user: mlm_admin

# Web services, Key Value (Redis), workers, etc.
services:
  # -------------------- Redis (Render Key Value) --------------------
  - type: keyvalue
    name: mlm-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

  # -------------------- Backend API --------------------
  - type: web
    name: mlm-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: mlm-admin-api
      - key: APP_VERSION
        value: 1.0.0
      - key: LOG_LEVEL
        value: info
      - key: LOG_FORMAT
        value: json
      - key: DB_SSL_MODE
        value: require
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mlm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mlm-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://mlm-frontend.onrender.com
      # CORS: Update this in Render dashboard if your service names differ
      - key: CORS_ALLOWED_ORIGINS
        value: https://mlm-frontend.onrender.com
    healthCheckPath: /api/v1/health
    autoDeploy: true

  # -------------------- Frontend --------------------
  - type: web
    name: mlm-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NODE_ENV
        value: production
      # Update this in Render dashboard if your backend service name differs
      - key: NEXT_PUBLIC_API_URL
        value: https://mlm-backend.onrender.com/api/v1
    healthCheckPath: /
    autoDeploy: true
